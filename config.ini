[files]
products_file = oguz.xlsx
sites_file    = sites.txt
output_dir    = output

[excel]
# Ürün kodlarının bulunduğu sütun (A, B, C, ...)
product_column = A
# Teklif-1 adet sütunu
offer1_column = B
# Teklif-2 adet sütunu
offer2_column = C
# Başlık satırı numarası (1'den başlar). 0 = başlık yok
header_row = 0
# Verinin başladığı satır numarası
start_row = 1

[scraper]
# Saniye cinsinden HTTP istek zaman aşımı
request_timeout = 15
# Her istek arasındaki bekleme süresi (saniye, float destekler)
delay_between_requests = 1.5
# Başarısız istekler için maksimum yeniden deneme sayısı
max_retries = 3
# JavaScript gerektiren siteler için Selenium kullan (true/false)
use_selenium = true
# Selenium headless modda çalışsın mı (true/false)
headless = false

[logging]
# Log seviyesi: DEBUG, INFO, WARNING, ERROR
level = INFO
log_file = logs/price_analyzer.log
